<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3FAFE5">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>FamilyQuest - Pełna Wersja</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Fredoka', sans-serif;
      background-image: url('t%C5%82o/tlo.jpg');
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      color: #fff;
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .app-container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      margin-bottom: 1rem;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      font-size: 1rem;
      min-width: 0;
      white-space: nowrap;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #0EA5E9, #14B8A6);
      color: white;
      box-shadow: 0 4px 15px rgba(20, 184, 166, 0.4);
    }
    
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(20, 184, 166, 0.55); }
    
    .btn-success { background: linear-gradient(135deg, #12B76A, #34D399); color: white; }
    .btn-danger { background: linear-gradient(135deg, #F97066, #FDA4A0); color: white; }
    .btn-secondary { background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid rgba(255, 255, 255, 0.3); }
    .btn-ghost { background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.25); }
    
    .input, .textarea, .select {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 1rem;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    
    .input::placeholder { color: rgba(255, 255, 255, 0.6); }
    .input:focus, .textarea:focus, .select:focus {
      outline: none;
      border-color: #FEC84B;
      background: rgba(255, 255, 255, 0.25);
    }
    .select {
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(15, 23, 42, 0.2);
      color: #0f172a;
      font-weight: 600;
    }
    .select option {
      color: #0f172a;
      background: #ffffff;
    }
    
    .task-item {
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      min-width: 0;
      cursor: pointer;
      transition: all 0.3s;
    }

    .task-item > * {
      min-width: 0;
    }

    .task-item > div[style*="flex: 1"] {
      flex: 1 1 220px !important;
    }

    .task-item .btn {
      flex: 0 0 auto;
    }

    .task-item .input[type="number"] {
      width: 6rem !important;
      flex: 0 1 7rem;
      margin-bottom: 0;
    }
    
    .task-item:hover { transform: translateX(5px); border-color: #FEC84B; }
    .task-item.completed { background: rgba(254, 200, 75, 0.2); border-color: #FEC84B; }
    .task-item.approved { background: rgba(18, 183, 106, 0.2); border-color: #12B76A; }
    
    .checkbox {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.5rem;
    }
    
    .task-item.completed .checkbox { background: #FEC84B; border-color: #FEC84B; }
    .task-item.approved .checkbox { background: #12B76A; border-color: #12B76A; }
    
    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      white-space: nowrap;
      text-align: center;
    }
    
    .badge-min { background: #7C3AED; color: white; }
    .badge-plus { background: #F97316; color: white; }
    .badge-weekly { background: #3B82F6; color: white; }
    .badge-points { background: #FEC84B; color: #0F172A; }
    .badge-pending { background: rgba(254, 200, 75, 0.2); color: #FEC84B; border: 1px solid #FEC84B; }

    .hero-metrics {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .child-hero-title {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin: 0;
      font-size: 2.75rem;
      line-height: 1.05;
      font-weight: 800;
    }

    .child-hero-avatar {
      font-size: 4.3rem;
      line-height: 1;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.25));
    }

    .hero-metric {
      min-width: 135px;
      padding: 0.85rem 1rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.28);
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    button.hero-metric {
      font: inherit;
      cursor: pointer;
      text-align: left;
    }

    button.hero-metric:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .hero-metric.points {
      background: rgba(254, 200, 75, 0.92);
      color: #0F172A;
      border-color: rgba(255, 255, 255, 0.5);
    }

    .hero-metric.rewards {
      background: rgba(18, 183, 106, 0.82);
      color: white;
      border-color: rgba(255, 255, 255, 0.38);
    }

    .hero-metric.streak {
      background: rgba(124, 58, 237, 0.82);
      color: white;
      border-color: rgba(255, 255, 255, 0.38);
    }

    .hero-metric-icon {
      font-size: 2.35rem;
      line-height: 1;
    }

    .hero-metric-value {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1;
    }

    .hero-metric-label {
      font-size: 0.85rem;
      font-weight: 700;
      opacity: 0.86;
    }
    
    .grid { display: grid; gap: 1rem; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.2);
      padding: 1.5rem;
      border-radius: 1rem;
      text-align: center;
    }
    
    .stat-value { font-size: 2.5rem; font-weight: 700; margin: 0.5rem 0; }
    .stat-label { font-size: 0.9rem; opacity: 0.8; }
    
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0.5rem;
      margin-top: 1rem;
      width: 100%;
      overflow: hidden;
    }
    
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      padding: 0.25rem;
      border-radius: 0.5rem;
      font-weight: 700;
      border: 2px solid transparent;
      min-width: 0;
    }
    
    .calendar-day-status {
      font-size: 1.05rem;
      line-height: 1;
    }
    
    .calendar-day-date {
      font-size: 0.72rem;
      line-height: 1;
      opacity: 0.9;
      letter-spacing: 0.02em;
    }
    
    .calendar-day.passed { background: rgba(18, 183, 106, 0.3); border-color: #12B76A; }
    .calendar-day.failed { background: rgba(249, 112, 102, 0.3); border-color: #F97066; }
    .calendar-day.na { background: rgba(148, 163, 184, 0.2); border-color: rgba(148, 163, 184, 0.4); }
    
    .modal {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center !important;
      justify-content: center !important;
      z-index: 1000;
      padding: 1rem !important;
      overflow-y: auto;
    }
    
    .modal-content {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      max-height: calc(100dvh - 2rem);
      overflow-y: auto;
    }

    .child-approval-modal {
      align-items: center !important;
      padding-top: 1rem !important;
      padding-bottom: 1rem !important;
      overflow-y: auto;
    }
    
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .tab {
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 1rem;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      font-weight: 600;
    }
    
    .tab.active { background: rgba(255, 255, 255, 0.3); color: white; }
    .tab:hover { background: rgba(255, 255, 255, 0.2); }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      font-size: 1.2rem;
    }
    
    .error {
      background: rgba(249, 112, 102, 0.2);
      border: 2px solid #F97066;
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .success {
      background: rgba(18, 183, 106, 0.2);
      border: 2px solid #12B76A;
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: confettiFall 3s linear forwards;
      pointer-events: none;
      z-index: 9999;
    }
    
    @keyframes confettiFall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
    
    .child-avatar { font-size: 5rem; margin: 1rem 0; }
    .child-card { text-align: center; padding: 2rem; cursor: pointer; transition: all 0.3s; }
    .child-card:hover { transform: scale(1.05); }

    .child-admin-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .child-admin-actions + .child-admin-actions {
      margin-top: 0.5rem;
    }

    .child-admin-actions .btn {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      width: 100%;
      justify-content: center;
      white-space: normal;
      line-height: 1.15;
      overflow-wrap: anywhere;
      padding-left: 0.7rem;
      padding-right: 0.7rem;
    }
    
    .progress-bar {
      height: 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #12B76A, #34D399);
      transition: width 1s ease;
      box-shadow: 0 0 10px rgba(18, 183, 106, 0.6);
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      opacity: 0.6;
    }
    
    .top-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: nowrap;
      margin-bottom: 1rem;
    }

    .network-status-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }
    
    .network-badge {
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.14);
    }
    
    .network-badge.offline {
      background: rgba(249, 112, 102, 0.2);
      border-color: #F97066;
    }
    
    .network-badge.syncing {
      background: rgba(254, 200, 75, 0.2);
      border-color: #FEC84B;
      color: #FEC84B;
    }
    
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    
    .history-day {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.8rem;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .point-history-modal-content {
      max-width: 640px;
      max-height: calc(100dvh - 2rem);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .point-history-header {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .point-history-header h2 {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .point-history-summary {
      margin-bottom: 1rem;
      background: rgba(254, 200, 75, 0.14);
      border-color: rgba(254, 200, 75, 0.4);
      flex: 0 0 auto;
    }

    .point-history-list {
      overflow-y: auto;
      padding-right: 0.25rem;
      display: grid;
      gap: 0.75rem;
      min-height: 0;
    }

    .point-history-entry {
      display: grid;
      grid-template-columns: minmax(4.5rem, auto) minmax(0, 1fr);
      gap: 0.85rem;
      align-items: start;
      width: 100%;
      min-width: 0;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 1rem;
      padding: 0.85rem;
    }

    .point-history-delta {
      justify-self: start;
      min-width: 4.5rem;
      text-align: center;
      white-space: nowrap;
    }

    .point-history-body {
      min-width: 0;
    }

    .point-history-title,
    .point-history-meta,
    .point-history-note {
      overflow-wrap: anywhere;
      word-break: normal;
    }

    .point-history-title {
      font-weight: 800;
      line-height: 1.2;
    }

    .point-history-meta {
      font-size: 0.84rem;
      opacity: 0.72;
      margin-top: 0.25rem;
      line-height: 1.25;
    }

    .point-history-note {
      font-size: 0.82rem;
      opacity: 0.72;
      margin-top: 0.25rem;
      line-height: 1.25;
    }

    .goal-icon {
      display: inline-block;
      animation: goalIconPulse 1.8s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes goalIconPulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 0 rgba(254, 200, 75, 0));
      }
      50% {
        transform: scale(1.14);
        filter: drop-shadow(0 0 8px rgba(254, 200, 75, 0.7));
      }
    }
    
    .reward-overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(124, 58, 237, 0.56)),
        rgba(0, 0, 0, 0.74);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 1rem;
      overflow: hidden;
    }
    
    .reward-overlay-content {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.13));
      border: 2px solid rgba(254, 200, 75, 0.92);
      backdrop-filter: blur(20px);
      border-radius: 1.25rem;
      max-width: 560px;
      width: 100%;
      padding: 2.25rem;
      text-align: center;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.46), 0 0 48px rgba(254, 200, 75, 0.28);
      animation: rewardPop 520ms cubic-bezier(0.2, 0.9, 0.24, 1.2);
    }

    .reward-overlay-content::before {
      content: '';
      position: absolute;
      inset: -55%;
      background: conic-gradient(
        from 0deg,
        rgba(254, 200, 75, 0.22),
        transparent 14deg,
        rgba(20, 184, 166, 0.18) 28deg,
        transparent 42deg,
        rgba(255, 107, 157, 0.18) 56deg,
        transparent 70deg
      );
      animation: rewardRays 9s linear infinite;
      opacity: 0.75;
    }

    .reward-overlay-content::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent 42%);
      pointer-events: none;
    }

    .reward-overlay-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .reward-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      background: rgba(254, 200, 75, 0.22);
      border: 1px solid rgba(254, 200, 75, 0.54);
      color: #FEC84B;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .reward-medal {
      width: 6.5rem;
      height: 6.5rem;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 35% 30%, #FFF7AD, #FEC84B 48%, #F97316 100%);
      border: 4px solid rgba(255, 255, 255, 0.62);
      color: #0F172A;
      font-size: 3.7rem;
      box-shadow: 0 14px 34px rgba(249, 115, 22, 0.32), inset 0 -8px 16px rgba(15, 23, 42, 0.18);
      animation: rewardMedalPulse 1.6s ease-in-out infinite;
    }

    .reward-title {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.3rem);
      line-height: 0.98;
      text-wrap: balance;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .reward-name {
      width: 100%;
      padding: 1rem;
      border-radius: 1rem;
      background: rgba(15, 23, 42, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.24);
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .reward-description {
      margin: 0;
      max-width: 36rem;
      opacity: 0.92;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .reward-fanfare {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      color: #FEC84B;
      font-weight: 800;
      font-size: 0.95rem;
    }

    .reward-overlay-content .btn {
      margin-top: 0.3rem;
      min-width: 13rem;
      box-shadow: 0 10px 28px rgba(20, 184, 166, 0.35);
    }

    @keyframes rewardPop {
      from {
        transform: translateY(18px) scale(0.9);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes rewardRays {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes rewardMedalPulse {
      0%, 100% {
        transform: scale(1) rotate(-2deg);
      }
      50% {
        transform: scale(1.08) rotate(2deg);
      }
    }

    .install-btn {
      position: fixed;
      right: 1rem;
      bottom: calc(1rem + env(safe-area-inset-bottom));
      z-index: 2200;
      display: none;
      border: 2px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      max-width: calc(100vw - 2rem);
    }
    
    @media (max-width: 768px) {
      .glass-card { padding: 1rem; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .app-container {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
      }
      .header {
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: stretch;
      }
      .header > .btn,
      .header > div > .btn {
        flex: 1 1 auto;
      }
      .tabs {
        gap: 0.4rem;
      }
      .tab {
        flex: 1 1 calc(50% - 0.4rem);
        padding: 0.65rem 0.55rem;
        font-size: 0.9rem;
      }
      .task-item {
        align-items: flex-start;
        gap: 0.65rem;
        padding: 0.85rem;
        overflow: hidden;
      }
      .task-item:hover {
        transform: none;
      }
      .task-item > div[style*="flex: 1"] {
        flex-basis: calc(100% - 52px) !important;
      }
      .task-item .badge {
        flex: 1 1 auto;
        white-space: normal;
        line-height: 1.15;
        padding: 0.35rem 0.55rem;
      }
      .task-item .btn {
        flex: 1 1 calc(50% - 0.4rem);
        padding: 0.7rem 0.55rem;
        font-size: 0.92rem;
        white-space: normal;
